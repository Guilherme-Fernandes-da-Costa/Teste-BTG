<div style="font-family: Arial, sans-serif; background-color: #f0f0f0; padding: 20px; min-height: 100vh;">
  
  <div style="display: flex; gap: 20px; margin-bottom: 20px;">
    <div style="background: white; padding: 15px; border-radius: 6px; border: 1px solid #ccc; flex: 1;">
      <h4 style="margin-top:0;">👥 Selecione o Paciente</h4>
      <select style="width: 100%; padding: 8px;" (change)="selecionarPessoa(pessoas[mySelect.selectedIndex - 1])" #mySelect>
        <option disabled selected>-- Escolha uma Pessoa --</option>
        <option *ngFor="let p of pessoas">{{ p.nomePessoa }} (ID: {{ p.numeroIdentificacao }})</option>
      </select>
    </div>

    <div style="background: white; padding: 15px; border-radius: 6px; border: 1px solid #ccc; flex: 1;">
      <h4 style="margin-top:0;">➕ Cadastros Rápidos</h4>
      <div style="display: flex; gap: 10px;">
        <input [(ngModel)]="novaPessoa.nomePessoa" placeholder="Nome" style="padding: 5px; width: 30%;">
        <input [(ngModel)]="novaPessoa.numeroIdentificacao" placeholder="Doc ID" style="padding: 5px; width: 25%;">
        <button (click)="cadastrarPessoa()" style="cursor:pointer;">+ Pessoa</button>
        
        <input [(ngModel)]="novaVacina.nomeVacina" placeholder="Nova Vacina" style="padding: 5px; width: 30%; margin-left: 10px;">
        <button (click)="cadastrarVacina()" style="cursor:pointer;">+ Vacina</button>
      </div>
    </div>
  </div>

  <div style="background: #ffffff; border: 2px solid #b5b5b5; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden;">
    
    <div style="background: linear-gradient(to bottom, #f9f9f9, #e3e3e3); padding: 5px 15px; border-bottom: 1px solid #b5b5b5;">
      <div style="background: white; display: inline-block; padding: 6px 25px; border: 1px solid #b5b5b5; border-bottom: none; border-top-left-radius: 6px; border-top-right-radius: 6px; font-weight: bold; color: #555; font-size: 14px;">
        Vacina
      </div>
    </div>

    <div style="background: #f7f7f7; border: 1px solid #dcdcdc; margin: 15px; padding: 15px; border-radius: 6px; position: relative;">
      <span style="position: absolute; top: -10px; left: 15px; background: #f7f7f7; padding: 0 5px; font-size: 12px; color: #666; font-weight: bold;">
        Informações do usuário:
      </span>
      
      <div style="display: flex; gap: 20px; align-items: center; font-size: 14px;">
        <div style="flex: 2;">
          <label style="color: #444;">Nome: </label>
          <input type="text" [value]="pessoaSelecionada ? pessoaSelecionada.nomePessoa : 'NENHUM PACIENTE SELECIONADO'" readonly
                 style="width: 85%; padding: 4px 8px; background: #ebebeb; border: 1px solid #ccc; color: #333; font-weight: bold;">
        </div>
        <div style="flex: 0.5;">
          <label style="color: #444;">ID Doc: </label>
          <input type="text" [value]="pessoaSelecionada ? pessoaSelecionada.numeroIdentificacao : '-'" readonly
                 style="width: 60%; padding: 4px 8px; background: #ebebeb; border: 1px solid #ccc; text-align: center;">
        </div>
        <div style="flex: 0.8;">
          <label style="color: #444;">Status: </label>
          <span [style.color]="pessoaSelecionada ? 'green' : 'red'" style="font-weight: bold;">
            {{ pessoaSelecionada ? '● Prontuário Ativo' : '○ Aguardando' }}
          </span>
        </div>
      </div>
    </div>

    <div style="display: flex; background: #e8e8e8; padding-left: 15px; border-bottom: 1px solid #cccccc; gap: 4px;">
      <div style="background: white; padding: 8px 16px; border: 1px solid #cccccc; border-bottom: transparent; border-top-left-radius: 4px; border-top-right-radius: 4px; font-weight: bold; font-size: 13px; color: #333; cursor: pointer;">
        Carteira Nacional de Vacinação
      </div>
      <div style="padding: 8px 16px; color: #777; font-size: 13px; font-weight: bold; cursor: not-allowed; background: #dfdfdf; border: 1px solid #ccc; border-bottom: transparent;">
        Outras Vacinas
      </div>
    </div>

    <div style="overflow-x: auto; padding: 15px; background: #ffffff;">
      <table style="width: 100%; border-collapse: collapse; min-width: 900px;">
        <thead>
          <tr>
            <th style="border: 1px solid #a0a0a0; background: #fffebd; padding: 10px; width: 120px; text-align: center; font-size: 14px; color: #800000; font-weight: bold;">
              Vacinas<br><hr style="border:0; border-top:1px solid #a0a0a0; margin:4px 0;"><span style="color:#004080;">Doses</span>
            </th>
            
            <th *ngFor="let v of vacinas" style="border: 1px solid #a0a0a0; background: #fffebd; padding: 10px; text-align: center; font-size: 11px; font-weight: bold; color: #333; min-width: 100px; text-transform: uppercase;">
              {{ v.nomeVacina }}
            </th>

            <th *ngIf="vacinas.length === 0" style="border: 1px solid #a0a0a0; background: #fffbeb; padding: 10px; color: #999; font-style: italic;">
              Nenhuma vacina no catálogo do BD.
            </th>
          </tr>
        </thead>
        
        <tbody>
          <tr *ngFor="let dose of listaDoses">
            
            <td style="border: 1px solid #a0a0a0; background: #fffebd; padding: 10px; font-size: 11px; font-weight: bold; color: #004080; text-align: center;">
              {{ dose }}
            </td>

            <td *ngFor="let v of vacinas" style="border: 1px solid #a0a0a0; text-align: center; padding: 4px; height: 55px; vertical-align: middle; position: relative;">
              
              <div *ngIf="!pessoaSelecionada" style="background: #e6e6e6; width: 100%; height: 100%; min-height: 45px;"></div>

              <div *ngIf="pessoaSelecionada" style="width:100%; height:100%;">
                
                <div *ngIf="obterStatusDose(v.nomeVacina, dose).aplicado as status" 
                     style="background: #ffffff; color: #27ae60; font-weight: bold; font-size: 12px; padding: 8px 2px; border-radius: 4px;">
                  <span>✓ Aplicado</span>
                  <br>
                  <button (click)="removerDoseNaGrade(obterStatusDose(v.nomeVacina, dose).idLog!)" 
                          style="background: none; border: none; color: #c0392b; font-size: 10px; text-decoration: underline; cursor: pointer; margin-top: 4px;">
                    Desfazer
                  </button>
                </div>

                <div *ngIf="!obterStatusDose(v.nomeVacina, dose).aplicado" style="height: 100%; display: flex; align-items: center; justify-content: center;">
                  <button (click)="adicionarDoseNaGrade(v.idVacina!, dose)"
                          title="Clique para registrar esta aplicação"
                          style="background: #fdfdfd; border: 1px dashed #bbb; color: #999; width: 90%; height: 80%; cursor: pointer; border-radius: 4px; font-size: 11px; transition: 0.2s;"
                          onmouseover="this.style.background='#eaf2ff'; this.style.color='#004080';"
                          onmouseout="this.style.background='#fdfdfd'; this.style.color='#999';">
                    + Registrar
                  </button>
                </div>

              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="background: #f7f7f7; padding: 10px 20px; border-top: 1px solid #cccccc; display: flex; justify-content: flex-end; gap: 15px;">
      <button onclick="window.print()" style="background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #555; font-size: 13px; font-weight: bold;">
        🖨️ Imprimir Espelho da Carteira
      </button>
    </div>

  </div>
</div>
